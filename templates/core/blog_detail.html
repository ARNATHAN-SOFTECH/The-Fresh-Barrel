{% extends 'base.html' %}

{% block content %}

<style>

.blog-detail-section{
    padding:60px 0;
    background:#f8f9fa;
    min-height:80vh;
}

.blog-wrapper{
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.blog-image{
    width:100%;
    max-height:500px;
    object-fit:cover;
    border-radius:18px 18px 0 0;
}

.blog-body{
    padding:40px;
}

.blog-title{
    color:var(--secondary);
    font-size:42px;
    font-weight:700;
    line-height:1.3;
    margin-bottom:15px;
}

.blog-meta{
    color:#777;
    font-size:15px;
    margin-bottom:25px;
}

.blog-meta span{
    margin-right:15px;
}

.blog-content{
    color:#444;
    line-height:2;
    font-size:17px;
}

.blog-content h2,
.blog-content h3{
    color:var(--primary);
    margin-top:30px;
    margin-bottom:15px;
}

.blog-content p{
    margin-bottom:18px;
}

.blog-content ul,
.blog-content ol{
    padding-left:20px;
    margin-bottom:20px;
}

.video-wrapper{
    margin-top:40px;
}

.video-title{
    color:var(--secondary);
    font-size:24px;
    font-weight:600;
    margin-bottom:20px;
}

.ratio iframe{
    border:none;
    border-radius:12px;
}

.back-btn{
    display:inline-block;
    margin-top:30px;
    padding:12px 25px;
    background:var(--primary);
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    transition:.3s;
}

.back-btn:hover{
    background:#145a32;
    color:#fff;
}

@media(max-width:768px){

    .blog-body{
        padding:25px;
    }

    .blog-image{
        height:250px;
    }

    .blog-title{
        font-size:30px;
    }

    .blog-content{
        font-size:16px;
        line-height:1.8;
    }
}

</style>

<section class="blog-detail-section">

    <div class="container">



            <img
                src="{{ blog.featured_image.url }}"
                class="blog-image"
                alt="{{ blog.title }}">

            <div class="blog-body">

                <h1 class="blog-title">
                    {{ blog.title }}
                </h1>

                <div class="blog-meta">

                    <span>
                        <i class="fa-regular fa-user"></i>
                        {{ blog.author }}
                    </span>

                    <span>
                        <i class="fa-regular fa-calendar"></i>
                        {{ blog.created_at|date:"F d, Y" }}
                    </span>

                </div>

                <div class="blog-content">
                    {{ blog.content|linebreaks }}
                </div>

                {% if blog.youtube_id %}
                <div class="video-wrapper">

                    <h3 class="video-title">
                        Watch Recipe Video
                    </h3>

                    <div class="ratio ratio-16x9">
                        <iframe
                            src="https://www.youtube.com/embed/{{ blog.youtube_id }}"
                            allowfullscreen>
                        </iframe>
                    </div>

                </div>
                {% endif %}

                <a href="{% url 'blog' %}" class="back-btn">
                    ← Back to Blogs
                </a>

            </div>

        </div>


</section>

{% endblock %}
