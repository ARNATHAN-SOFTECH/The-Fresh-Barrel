{% extends 'base.html' %}
{% load static %}

{% block title %}
Verify OTP
{% endblock %}

{% block content %}

<style>

.verify-container{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f7f5;
    padding:40px 0;
}

.verify-card{
    width:420px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.verify-card h2{
    text-align:center;
    color:#198754;
    margin-bottom:25px;
    font-weight:bold;
}

.form-control{
    height:45px;
}

.btn-verify{
    width:100%;
    background:#198754;
    color:#fff;
    border:none;
    padding:12px;
    border-radius:8px;
    font-size:17px;
    font-weight:600;
    transition:.3s;
}

.btn-verify:hover{
    background:#157347;
}

/* Success Message */

.alert-success{
    background:#d1e7dd;
    color:#0f5132;
    border:1px solid #badbcc;
    font-weight:600;
}

/* Error Message */

.alert-error,
.alert-danger{
    background:#f8d7da;
    color:#842029;
    border:1px solid #f5c2c7;
    font-weight:600;
}

</style>

<div class="verify-container">

    <div class="verify-card">

        <h2>Verify OTP</h2>

        {% if messages %}
            {% for message in messages %}

                <div class="alert
                    {% if message.tags == 'error' %}
                        alert-danger
                    {% else %}
                        alert-{{ message.tags }}
                    {% endif %}
                    alert-dismissible fade show"
                    role="alert">

                    {{ message }}

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                    </button>

                </div>

            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'verify' %}">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Enter OTP
                </label>

                <input
                    type="text"
                    name="otp"
                    class="form-control"
                    placeholder="Enter 6-digit OTP"
                    maxlength="6"
                    required>

            </div>

            <button
                type="submit"
                class="btn-verify">

                Verify OTP

            </button>

        </form>

    </div>

</div>

{% endblock %}
