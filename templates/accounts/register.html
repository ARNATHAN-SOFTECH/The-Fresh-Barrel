{% extends 'base.html' %}
{% load static %}

{% block title %}
Register | The Fresh Barrel
{% endblock %}

{% block content %}

<style>
.register-container{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f7f5;
    padding:40px 0;
}

.register-card{
    width:420px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.register-card h2{
    text-align:center;
    color:#198754;
    margin-bottom:25px;
    font-weight:bold;
}

.btn-register{
    width:100%;
    background:#198754;
    color:#fff;
    border:none;
    padding:12px;
    border-radius:8px;
    font-size:17px;
    font-weight:600;
    transition:0.3s;
}

.btn-register:hover{
    background:#157347;
}

.spinner-border{
    width:18px;
    height:18px;
    margin-right:8px;
    display:none;
}

.form-control{
    height:45px;
}

.alert{
    margin-bottom:20px;
}
</style>

<div class="register-container">

    <div class="register-card">

        <h2>Login / Register</h2>


        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'register' %}" id="registerForm">

            {% csrf_token %}

            <div class="mb-3" id="nameField">

                <label class="form-label">
                    Full Name
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="name">

            </div>

            <div class="mb-3" id="placeField">

                <label class="form-label">
                    Place
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="place">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="example@gmail.com"
                    required>

                <small class="text-muted">
                    Enter your registered email address.
                </small>

            </div>

            <button
                type="submit"
                class="btn-register"
                id="sendOtpBtn">

                <span
                    class="spinner-border spinner-border-sm"
                    id="spinner">
                </span>

                <span id="btnText">
                    Send OTP
                </span>

            </button>

        </form>

    </div>

</div>

<script>

// Show loading spinner
document.getElementById("registerForm").addEventListener("submit", function(){

    document.getElementById("spinner").style.display = "inline-block";

    document.getElementById("btnText").innerHTML = "Sending OTP...";

    document.getElementById("sendOtpBtn").disabled = true;

});

// Check whether the email already exists
const emailInput = document.querySelector("input[name='email']");

emailInput.addEventListener("blur", function(){

    if(this.value.trim() === ""){
        return;
    }

    fetch("/accounts/check-email/?email=" + encodeURIComponent(this.value))

    .then(response => response.json())

    .then(data => {

        if(data.exists){

            // Existing user → Hide Name & Place
            document.getElementById("nameField").style.display = "none";
            document.getElementById("placeField").style.display = "none";

        }else{

            // New user → Show Name & Place
            document.getElementById("nameField").style.display = "block";
            document.getElementById("placeField").style.display = "block";

        }

    });

});

</script>

{% endblock %}
