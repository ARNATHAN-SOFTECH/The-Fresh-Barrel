{% extends 'base.html' %}
{% load static %}

{% block title %}
Register | The Fresh Barrel
{% endblock %}

{% block content %}

<style>
.register-container{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f7f5;
    padding:40px 0;
}

.register-card{
    width:420px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.register-card h2{
    text-align:center;
    color:#198754;
    margin-bottom:25px;
    font-weight:bold;
}

.btn-register{
    width:100%;
    background:#198754;
    color:#fff;
    border:none;
    padding:12px;
    border-radius:8px;
    font-size:17px;
    font-weight:600;
}

.btn-register:hover{
    background:#157347;
}
</style>

<div class="register-container">

    <div class="register-card">

        <h2>Create Account</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Place</label>
                <input type="text" name="place" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input type="text" name="mobile" class="form-control" maxlength="10" required>
            </div>

            <button type="submit" class="btn-register">
                Send OTP
            </button>

        </form>

    </div>

</div>

{% endblock %}
