{% extends 'base.html' %}

{% block content %}

<style>

.product-section{
    width:90%;
    margin:50px auto;
}

.product-title{
    text-align:center;
    font-size:34px;
    font-weight:700;
    color:#222;
    margin-bottom:40px;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:25px;
}

.product-card{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #eee;
    transition:.3s;
}

.product-card:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.image-wrapper{
    width:100%;
    height:250px;
    overflow:hidden;
}

.product-image{
    width:100%;
    height:170px;
    object-fit:cover;
    display:block;
}

.product-content{
    padding:15px;
}

.product-name{
    font-size:17px;
    font-weight:600;
    color:#222;
    line-height:1.5;
    min-height:55px;
}

.product-weight{
    color:#777;
    font-size:14px;
    margin:10px 0;
}

.price-box{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:15px;
}

.old-price{
    color:#888;
    text-decoration:line-through;
    font-size:15px;
}

.new-price{
    color:#0b6b31;
    font-size:20px;
    font-weight:700;
}

.product-link{
    text-decoration:none;
    color:inherit;
}

.add-btn{
    width:100%;
    border:none;
    background:#0b6b31;
    color:white;
    padding:12px;
    border-radius:8px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
}

.add-btn:hover{
    opacity:.9;
}

.empty{
    text-align:center;
    font-size:18px;
    color:#666;
}

@media(max-width:1400px){

    .product-grid{
        grid-template-columns:repeat(4,1fr);
    }

}

@media(max-width:1000px){

    .product-grid{
        grid-template-columns:repeat(2,1fr);
    }

}

@media(max-width:600px){

    .product-grid{
        grid-template-columns:1fr;
    }

}

</style>

<section class="product-section">

    <h1 class="product-title">
        {{ category.name }}
    </h1>

    <div class="product-grid">

        {% for product in products %}

        <a href="{% url 'product_detail' product.id %}"
          class="product-link">

        <div class="product-card">

                <img src="{{ product.image.url }}"
                    alt="{{ product.name }}"
                    class="product-image">

            <div class="product-content">

                <div class="product-name">
                    {{ product.name }}
                </div>

                <div class="product-weight">
                    {{ product.weight }}
                </div>

                <div class="price-box">

                    <span class="old-price">
                        ₹{{ product.original_price }}
                    </span>

                    <span class="new-price">
                        ₹{{ product.selling_price }}
                    </span>

                </div>


            </div>

        </div>
      </a>

        {% empty %}

        <div class="empty">
            No products available.
        </div>

        {% endfor %}

    </div>

</section>

{% endblock %}
