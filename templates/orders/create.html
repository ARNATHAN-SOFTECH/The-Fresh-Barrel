{% extends 'base.html' %}

{% block content %}

<style>

.register-container{
    width:88%;
    max-width:1100px;
    margin:40px auto 80px;
}

.register-title{
    text-align:center;
    font-size:42px;
    font-weight:500;
    color:var(--secondary);
    margin-bottom:10px;
}

.register-note{
    text-align:center;
    color:#ff4b36;
    font-size:14px;
    font-weight:600;
    margin-bottom:40px;
}

/* FORM CARD */

.register-card{
    max-width:900px;
    margin:0 auto;
    background:#fff;
    border:1px solid #ddd;
    padding:40px;
}

.section-title{
    font-size:24px;
    font-weight:600;
    color:var(--primary);
    margin-bottom:30px;
    padding-bottom:15px;
    border-bottom:1px solid #ddd;
}

/* FORM */

.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.form-group{
    margin-bottom:22px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:600;
    color:#444;
}

.form-group input{
    width:100%;
    height:48px;
    padding:0 15px;
    border:1px solid #ccc;
    font-size:15px;
    outline:none;
}

.form-group input:focus{
    border-color:var(--primary);
}

/* CHECKBOX */

.checkbox{
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin-top:15px;
    color:#555;
    font-size:14px;
}

.checkbox input{
    margin-top:3px;
}

/* FOOTER */

.submit-row{
    margin-top:35px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-top:1px solid #ddd;
    padding-top:25px;
}

.back-link{
    text-decoration:none;
    color:#666;
    font-weight:500;
}

.back-link:hover{
    color:var(--primary);
}

.submit-btn{
    background:var(--primary);
    color:white;
    border:none;
    padding:14px 30px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
}

.submit-btn:hover{
    opacity:0.9;
}

/* MOBILE */

@media(max-width:768px){

    .register-title{
        font-size:34px;
    }

    .register-card{
        padding:25px;
    }

    .form-row{
        grid-template-columns:1fr;
        gap:0;
    }

    .submit-row{
        flex-direction:column;
        gap:20px;
    }

    .submit-btn{
        width:100%;
    }
}

</style>

<div class="register-container">

    <h1 class="register-title">
        Create an Account
    </h1>

        <p class="register-note">
        Create your Fresh Barrel account to continue shopping
    </p>

    <div class="register-card">

    <form method="POST">

        {% csrf_token %}

        <div class="section-title">
            PERSONAL INFORMATION
        </div>

        <div class="form-row">

            <div class="form-group">
                <label>First Name *</label>
                <input type="text"
                       name="first_name"
                       required>
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text"
                       name="last_name">
            </div>

            <div class="form-group">
                <label>Email Address *</label>
                <input type="email"
                       name="email"
                       required>
            </div>

            <div class="form-group">
                <label>Mobile Number *</label>
                <input type="text"
                       name="mobile"
                       required>
            </div>

        </div>

        <div class="checkbox">
            <input type="checkbox">
            Sign Up for Newsletter
        </div>

        <br>

        <div class="section-title">
            LOGIN INFORMATION
        </div>

        <div class="form-row">

            <div class="form-group">
                <label>Password *</label>
                <input type="password"
                       name="password"
                       required>
            </div>

            <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password"
                       name="confirm_password"
                       required>
            </div>

        </div>

        <div class="checkbox">
            <input type="checkbox">
            Remember Me
        </div>

        <div class="submit-row">

            <a href="{% url 'login' %}"
               class="back-link">
                ← Back
            </a>

            <button type="submit"
                    class="submit-btn">
                Submit
            </button>

        </div>

    </form>

    </div>
</div>

{% endblock %}
